<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anne&Max Bezoekenkaart</title>
  <meta name="theme-color" content="#3f7d58">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Anne&Max Kaart">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --bg:#f4efe7; --panel:#fffdf9; --ink:#223329; --muted:#6c756f;
      --green:#3f7d58; --green-soft:#e7f2ea; --red:#c75d4b; --red-soft:#f7e9e6;
      --line:#ded9cf; --gold:#cf9a58;
    }
    * { box-sizing:border-box; }
    html,body { height:100%; margin:0; overscroll-behavior:none; font-family:Inter,Segoe UI,Arial,sans-serif; background:var(--bg); color:var(--ink); }
    .app { height:100%; display:grid; grid-template-columns:390px 1fr; }
    aside { background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column; min-height:0; z-index:1000; }
    header { padding:22px 20px 14px; border-bottom:1px solid var(--line); }
    .eyebrow { font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.14em; color:var(--green); }
    h1 { margin:7px 0 5px; font-family:Georgia,serif; font-size:28px; line-height:1.1; }
    .subtitle { font-size:14px; color:var(--muted); line-height:1.45; }

    .progress-wrap { margin-top:16px; }
    .progress-line { display:flex; justify-content:space-between; gap:12px; font-size:13px; font-weight:700; margin-bottom:7px; }
    .progress-bg { height:12px; border-radius:999px; background:#e8e3da; overflow:hidden; }
    .progress-bar { height:100%; width:0; background:linear-gradient(90deg,var(--green),#75a987); transition:width .25s ease; }
    .stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:10px; }
    .stat { border-radius:11px; padding:10px 12px; font-size:12px; font-weight:800; }
    .stat.visited { background:var(--green-soft); color:var(--green); }
    .stat.remaining { background:var(--red-soft); color:#9d4739; }

    .controls { padding:12px; border-bottom:1px solid var(--line); display:grid; gap:9px; }
    input[type="search"] { width:100%; padding:12px 13px; border:1px solid #cbc5ba; border-radius:10px; font-size:15px; background:#fff; outline:none; }
    input[type="search"]:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(63,125,88,.14); }
    .filters { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
    .filter-btn, .secondary-btn {
      border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:9px; padding:9px 8px; cursor:pointer; font-weight:700;
    }
    .filter-btn.active { background:var(--green); color:#fff; border-color:var(--green); }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
    .secondary-btn:hover { background:#f4f0e8; }
    .status { font-size:12px; color:var(--muted); min-height:16px; }

    .list { overflow:auto; padding:9px; }
    .card { border:1px solid var(--line); border-radius:13px; padding:12px; margin-bottom:9px; background:#fff; box-shadow:0 2px 7px rgba(0,0,0,.03); }
    .card.visited { background:var(--green-soft); border-color:#c9ddcf; }
    .card-top { display:flex; gap:10px; align-items:flex-start; }
    .card-content { flex:1; min-width:0; cursor:pointer; }
    .card strong { display:block; font-size:14px; margin-bottom:4px; }
    .card .address { display:block; color:var(--muted); font-size:12.5px; line-height:1.4; }
    .visit-btn {
      flex:0 0 auto; border:0; border-radius:9px; padding:9px 10px; font-size:12px; font-weight:800; cursor:pointer;
      background:var(--red-soft); color:#9d4739;
    }
    .card.visited .visit-btn { background:var(--green); color:white; }
    .card.visited strong::after { content:" ✓"; color:var(--green); }
    .mini-actions { display:flex; gap:7px; margin-top:10px; }
    .mini-actions a, .food-btn {
      text-decoration:none; font-size:12px; font-weight:700; color:var(--green); background:#fff;
      border:1px solid #cbd9cf; border-radius:8px; padding:7px 9px; cursor:pointer;
    }
    .food-summary {
      margin-top:9px; padding:9px 10px; border-radius:9px; background:#f7f3ec;
      font-size:12px; color:var(--muted); line-height:1.45; display:none;
    }
    .food-summary.has-data { display:block; }
    .food-summary b { color:var(--ink); }
    .modal-backdrop {
      position:fixed; inset:0; z-index:4000; display:none; align-items:flex-end;
      background:rgba(18,28,22,.5); padding:12px;
    }
    .modal-backdrop.open { display:flex; }
    .modal {
      width:min(620px,100%); margin:0 auto; background:var(--panel); border-radius:18px;
      padding:18px; box-shadow:0 18px 50px rgba(0,0,0,.3); max-height:90vh; overflow:auto;
    }
    .modal h2 { margin:0 0 5px; font-family:Georgia,serif; font-size:22px; }
    .modal-location { color:var(--muted); font-size:13px; margin-bottom:15px; }
    .field { margin-bottom:13px; }
    .field label { display:block; font-size:13px; font-weight:800; margin-bottom:6px; }
    .field textarea {
      width:100%; min-height:82px; resize:vertical; border:1px solid #cbc5ba; border-radius:10px;
      padding:11px; font:inherit; font-size:16px; background:#fff;
    }
    .modal-actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:6px; }
    .modal-actions button {
      min-height:46px; border:0; border-radius:11px; font-weight:800; cursor:pointer;
    }
    .cancel-modal { background:#eee9e1; color:var(--ink); }
    .save-modal { background:var(--green); color:white; }

    #map { width:100%; height:100%; background:#dfe8df; }
    .leaflet-popup-content-wrapper { border-radius:13px; }
    .popup-title { font-weight:800; font-size:16px; margin-bottom:5px; }
    .popup-address { color:var(--muted); line-height:1.4; margin-bottom:9px; }
    .popup-status { display:inline-block; border-radius:999px; padding:5px 8px; font-size:12px; font-weight:800; margin-bottom:9px; }
    .popup-status.yes { background:var(--green-soft); color:var(--green); }
    .popup-status.no { background:var(--red-soft); color:#9d4739; }
    .popup-link { display:inline-block; text-decoration:none; color:#fff !important; background:var(--green); padding:8px 10px; border-radius:8px; font-weight:700; }

    .pin { width:30px; height:30px; border-radius:50% 50% 50% 0; transform:rotate(-45deg); border:3px solid white; box-shadow:0 2px 8px rgba(0,0,0,.28); }
    .pin.red { background:var(--red); }
    .pin.green { background:var(--green); }
    .pin:after { content:""; position:absolute; width:8px; height:8px; border-radius:50%; background:#fff; left:8px; top:8px; }

    @media (max-width:820px) {
      html, body { height:100%; overflow:hidden; }
      .app { display:block; height:100%; position:relative; }
      aside {
        position:absolute; inset:0; z-index:900;
        border:0; background:var(--panel);
      }
      header {
        padding:12px 14px 10px;
        max-height:none;
      }
      .eyebrow { font-size:10px; }
      h1 { font-size:21px; margin:4px 0; }
      .subtitle { font-size:12.5px; line-height:1.35; }
      .progress-wrap { margin-top:10px; }
      .progress-line { font-size:12px; margin-bottom:5px; }
      .progress-bg { height:10px; }
      .stats { margin-top:7px; gap:6px; }
      .stat { padding:8px 9px; font-size:11.5px; }

      .controls {
        padding:8px 10px;
        gap:7px;
      }
      input[type="search"] {
        padding:12px;
        font-size:16px;
      }
      .filters { gap:6px; }
      .filter-btn, .secondary-btn {
        min-height:44px;
        padding:9px 6px;
        font-size:12px;
      }
      .actions { display:none; }

      .list {
        padding:8px 8px 88px;
        height:calc(100% - 268px);
        overflow-y:auto;
        -webkit-overflow-scrolling:touch;
      }
      .card {
        padding:11px;
        margin-bottom:8px;
        border-radius:12px;
      }
      .card-top { gap:8px; align-items:center; }
      .card strong { font-size:14px; }
      .card .address { font-size:12px; }
      .visit-btn {
        min-height:42px;
        min-width:112px;
        padding:9px 10px;
        font-size:11.5px;
      }
      .mini-actions a {
        display:inline-flex;
        align-items:center;
        min-height:40px;
        font-size:12px;
      }

      #map {
        position:absolute;
        inset:0;
        z-index:800;
        height:100%;
      }

      body.mobile-list aside { display:flex; }
      body.mobile-list #map { display:none; }
      body.mobile-map aside { display:none; }
      body.mobile-map #map { display:block; }

      .mobile-nav {
        position:fixed;
        left:10px; right:10px; bottom:10px;
        z-index:2000;
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:8px;
        padding:8px;
        border-radius:16px;
        background:rgba(255,253,249,.96);
        box-shadow:0 8px 26px rgba(0,0,0,.18);
        border:1px solid var(--line);
        backdrop-filter:blur(10px);
      }
      .mobile-nav button {
        min-height:48px;
        border:0;
        border-radius:12px;
        font-size:14px;
        font-weight:800;
        cursor:pointer;
        background:#eee9e1;
        color:var(--ink);
      }
      .mobile-nav button.active {
        background:var(--green);
        color:white;
      }
    }

    @media (min-width:821px) {
      .mobile-nav { display:none; }
    }
  </style>
</head>
<body class="mobile-list">
<div class="app">
  <aside>
    <header>
      <div class="eyebrow">Anne&amp;Max bezoekenkaart</div>
      <h1>Hoeveel filialen heb jij bezocht?</h1>
      <div class="subtitle">Klik op de rode knop naast een filiaal. Bezochte locaties worden groen en blijven opgeslagen in deze browser.</div>
      <div class="progress-wrap">
        <div class="progress-line"><span>Voortgang</span><span id="progressText">0%</span></div>
        <div class="progress-bg"><div class="progress-bar" id="progressBar"></div></div>
        <div class="stats">
          <div class="stat visited" id="visitedStat">0 bezocht</div>
          <div class="stat remaining" id="remainingStat">0 nog te gaan</div>
        </div>
      </div>
    </header>

    <div class="controls">
      <input id="search" type="search" placeholder="Zoek op plaats, straat of postcode…">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">Alle</button>
        <button class="filter-btn" data-filter="unvisited">Nog te gaan</button>
        <button class="filter-btn" data-filter="visited">Bezocht</button>
      </div>
      <div class="actions">
        <button class="secondary-btn" id="fit">Toon Nederland</button>
        <button class="secondary-btn" id="reset">Wis vinkjes</button>
<button class="secondary-btn" id="installApp" style="display:none; grid-column:1/-1;">
  Installeer app
</button>

      </div>
      <div class="status" id="status"></div>
    </div>

    <div class="list" id="list"></div>
  </aside>
  <main id="map"></main>
</div>


<div class="modal-backdrop" id="foodModal" role="dialog" aria-modal="true" aria-labelledby="foodModalTitle">
  <div class="modal">
    <h2 id="foodModalTitle">Eten en drinken</h2>
    <div class="modal-location" id="foodModalLocation"></div>
    <div class="field">
      <label for="foodInput">Wat heb je gegeten?</label>
      <textarea id="foodInput" placeholder="Bijvoorbeeld: avocado toast, croissant…"></textarea>
    </div>
    <div class="field">
      <label for="drinkInput">Wat heb je gedronken?</label>
      <textarea id="drinkInput" placeholder="Bijvoorbeeld: cappuccino, verse jus…"></textarea>
    </div>
    <div class="field">
      <label for="noteInput">Extra notitie</label>
      <textarea id="noteInput" placeholder="Bijvoorbeeld: favoriet gerecht of beoordeling…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="cancel-modal" id="cancelFood">Annuleren</button>
      <button class="save-modal" id="saveFood">Opslaan</button>
    </div>
  </div>
</div>

<div class="mobile-nav" aria-label="Mobiele navigatie">
  <button id="showList" class="active">Lijst</button>
  <button id="showMap">Kaart</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const locations = [{"name": "Alkmaar", "address": "Kraanbuurt 3, 1811 BK Alkmaar", "lat": 52.6324, "lon": 4.7534}, {"name": "Amsterdam Oostenburg", "address": "Oostenburgervoorstraat 1, 1018 MN Amsterdam", "lat": 52.3718, "lon": 4.925}, {"name": "Amsterdam Zeeburg", "address": "Oostelijke Handelskade 1001, 1019 BW Amsterdam", "lat": 52.374, "lon": 4.951}, {"name": "Amsterdam Zuid", "address": "Amstelveenseweg 196, 1075 XS Amsterdam", "lat": 52.3517, "lon": 4.8552}, {"name": "Apeldoorn", "address": "Hoofdstraat 145-147, 7311 AV Apeldoorn", "lat": 52.2113, "lon": 5.9699}, {"name": "Arnhem Bakkerstraat", "address": "Bakkerstraat 50, 6811 EH Arnhem", "lat": 51.9816, "lon": 5.9094}, {"name": "Arnhem Steenstraat", "address": "Steenstraat 29, 6828 CB Arnhem", "lat": 51.9856, "lon": 5.9175}, {"name": "Breda Wilhelminastraat", "address": "Wilhelminastraat 17, 4818 SB Breda", "lat": 51.5822, "lon": 4.7797}, {"name": "Breda Veemarktstraat", "address": "Veemarktstraat 44, 4811 ZG Breda", "lat": 51.589, "lon": 4.7789}, {"name": "Delft", "address": "Stationsplein 303, 2611 BV Delft", "lat": 52.0067, "lon": 4.3568}, {"name": "Den Bosch", "address": "Oude Dieze 25, 5211 KT 's-Hertogenbosch", "lat": 51.6888, "lon": 5.301}, {"name": "Den Haag Fahrenheit", "address": "Fahrenheitstraat 472, 2561 DH Den Haag", "lat": 52.0746, "lon": 4.2647}, {"name": "Den Haag Fred", "address": "Frederik Hendriklaan 166, 2582 BK Den Haag", "lat": 52.089, "lon": 4.278}, {"name": "Den Haag Hoytema", "address": "Van Hoytemastraat 53, 2596 EN Den Haag", "lat": 52.091, "lon": 4.3135}, {"name": "Den Haag Kerkplein", "address": "Kerkplein 4, 2513 AZ Den Haag", "lat": 52.0786, "lon": 4.3068}, {"name": "Eindhoven Kleine Berg", "address": "Kleine Berg 79-81, 5611 JT Eindhoven", "lat": 51.4379, "lon": 5.473}, {"name": "Eindhoven Strijp-S", "address": "Philitelaan 57, 5617 AK Eindhoven", "lat": 51.4488, "lon": 5.4564}, {"name": "Groningen", "address": "Turfsingel 18-20, 9712 KR Groningen", "lat": 53.2217, "lon": 6.5711}, {"name": "Haarlem", "address": "Grote Markt 5, 2011 RC Haarlem", "lat": 52.3811, "lon": 4.6364}, {"name": "Leeuwarden", "address": "Naauw 18, 8911 HX Leeuwarden", "lat": 53.2017, "lon": 5.7953}, {"name": "Leiden", "address": "Gangetje 2, 2311 ER Leiden", "lat": 52.1584, "lon": 4.4936}, {"name": "Leidschendam – Mall of the Netherlands", "address": "Liguster 62, 2262 AC Leidschendam", "lat": 52.0887, "lon": 4.3833}, {"name": "Maastricht", "address": "Markt 27, 6211 CJ Maastricht", "lat": 50.8515, "lon": 5.6918}, {"name": "Nijmegen", "address": "Lange Hezelstraat 13, 6511 CA Nijmegen", "lat": 51.8476, "lon": 5.8584}, {"name": "Rotterdam Korte Hoogstraat", "address": "Korte Hoogstraat 20, 3011 GL Rotterdam", "lat": 51.919, "lon": 4.4822}, {"name": "Tilburg", "address": "Frederikstraat 284, 5038 AZ Tilburg", "lat": 51.5555, "lon": 5.0797}, {"name": "Utrecht Burgemeester Reiger", "address": "Burgemeester Reigerstraat 15, 3581 KJ Utrecht", "lat": 52.0892, "lon": 5.1378}, {"name": "Utrecht Domkwartier", "address": "Donkere Gaard 4, 3511 KW Utrecht", "lat": 52.0907, "lon": 5.1212}, {"name": "Utrecht Domstraat", "address": "Domstraat 4, 3512 JB Utrecht", "lat": 52.0924, "lon": 5.1217}, {"name": "Zwolle", "address": "Sassenstraat 39, 8011 PB Zwolle", "lat": 52.5107, "lon": 6.0945}];
const STORAGE_KEY = 'annemax-visited-v2';
const FOOD_KEY = 'annemax-food-log-v1';
let visited = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let foodLog = JSON.parse(localStorage.getItem(FOOD_KEY) || '{}');
let activeFilter = 'all';
let activeFoodIndex = null;

const map = L.map('map').setView([52.15, 5.35], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:19,
  attribution:'&copy; OpenStreetMap-bijdragers'
}).addTo(map);

const markers = [];
const cards = [];
const list = document.getElementById('list');
const status = document.getElementById('status');

function idFor(loc) {
  return (loc.name + '|' + loc.address).toLowerCase();
}
function isVisited(loc) {
  return !!visited[idFor(loc)];
}
function mapsUrl(loc) {
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent('Anne & Max, ' + loc.address);
}
function iconFor(done) {
  return L.divIcon({
    className:'',
    html:`<div class="pin ${done ? 'green' : 'red'}"></div>`,
    iconSize:[30,30], iconAnchor:[15,30], popupAnchor:[0,-30]
  });
}
function popupHtml(loc) {
  const done = isVisited(loc);
  return `<div class="popup-title">Anne&amp;Max ${loc.name}</div>
    <div class="popup-address">${loc.address}</div>
    <div class="popup-status ${done ? 'yes' : 'no'}">${done ? 'Bezocht ✓' : 'Nog niet bezocht'}</div><br>
    <a class="popup-link" target="_blank" rel="noopener" href="${mapsUrl(loc)}">Open in Google Maps</a>`;
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(visited));
}
function updateProgress() {
  const count = locations.filter(isVisited).length;
  const pct = Math.round((count / locations.length) * 100);
  document.getElementById('visitedStat').textContent = `${count} bezocht`;
  document.getElementById('remainingStat').textContent = `${locations.length - count} nog te gaan`;
  document.getElementById('progressText').textContent = `${pct}%`;
  document.getElementById('progressBar').style.width = `${pct}%`;
}
function setVisited(index, value) {
  const loc = locations[index];
  const id = idFor(loc);
  if (value) visited[id] = true;
  else delete visited[id];
  save();
  renderState(index);
  updateProgress();
  applyFilters();
}
function renderState(index) {
  const loc = locations[index];
  const done = isVisited(loc);
  const card = cards[index];
  card.classList.toggle('visited', done);
  const btn = card.querySelector('.visit-btn');
  btn.textContent = done ? 'Bezocht ✓' : 'Markeer bezocht';
  markers[index].setIcon(iconFor(done));
  markers[index].setPopupContent(popupHtml(loc));
}
function escapeHtml(value) {
  return String(value || '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;');
}
function foodEntry(loc) {
  return foodLog[idFor(loc)] || { food:'', drink:'', note:'' };
}
function foodSummaryHtml(loc) {
  const entry = foodEntry(loc);
  const parts = [];
  if (entry.food) parts.push(`<b>Gegeten:</b> ${escapeHtml(entry.food)}`);
  if (entry.drink) parts.push(`<b>Gedronken:</b> ${escapeHtml(entry.drink)}`);
  if (entry.note) parts.push(`<b>Notitie:</b> ${escapeHtml(entry.note)}`);
  return parts.join('<br>');
}
function cardHtml(loc, done) {
  const summary = foodSummaryHtml(loc);
  return `
    <div class="card-top">
      <div class="card-content">
        <strong>Anne&amp;Max ${loc.name}</strong>
        <span class="address">${loc.address}</span>
      </div>
      <button class="visit-btn">${done ? 'Bezocht ✓' : 'Markeer bezocht'}</button>
    </div>
    <div class="mini-actions">
      <a target="_blank" rel="noopener" href="${mapsUrl(loc)}">Route openen</a>
      <button class="food-btn">Eten &amp; drinken</button>
    </div>
    <div class="food-summary ${summary ? 'has-data' : ''}">${summary}</div>`;
}

locations.forEach((loc, i) => {
  const marker = L.marker([loc.lat, loc.lon], {icon:iconFor(isVisited(loc))})
    .addTo(map)
    .bindPopup(popupHtml(loc));
  markers.push(marker);

  const card = document.createElement('div');
  card.className = 'card' + (isVisited(loc) ? ' visited' : '');
  card.dataset.index = i;
  card.innerHTML = cardHtml(loc, isVisited(loc));
  card.querySelector('.card-content').addEventListener('click', () => {
    map.setView(marker.getLatLng(), 16, {animate:true});
    marker.openPopup();
  });
  card.querySelector('.visit-btn').addEventListener('click', () => {
    setVisited(i, !isVisited(loc));
  });
  card.querySelector('.food-btn').addEventListener('click', () => openFoodModal(i));
  cards.push(card);
  list.appendChild(card);
});

function matchFilter(loc, q) {
  const textMatch = !q || (loc.name + ' ' + loc.address).toLowerCase().includes(q);
  const visitMatch =
    activeFilter === 'all' ||
    (activeFilter === 'visited' && isVisited(loc)) ||
    (activeFilter === 'unvisited' && !isVisited(loc));
  return textMatch && visitMatch;
}
function applyFilters() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  let visible = [];
  locations.forEach((loc, i) => {
    const show = matchFilter(loc, q);
    cards[i].style.display = show ? '' : 'none';
    if (show) {
      if (!map.hasLayer(markers[i])) markers[i].addTo(map);
      visible.push(markers[i]);
    } else if (map.hasLayer(markers[i])) {
      map.removeLayer(markers[i]);
    }
  });
  status.textContent = `${visible.length} filiaal${visible.length === 1 ? '' : 'en'} zichtbaar`;
  if (visible.length) map.fitBounds(L.featureGroup(visible).getBounds().pad(.14));
}

document.getElementById('search').addEventListener('input', applyFilters);
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilters();
  });
});
document.getElementById('fit').addEventListener('click', () => {
  activeFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === 'all'));
  document.getElementById('search').value = '';
  applyFilters();
});
document.getElementById('reset').addEventListener('click', () => {
  if (confirm('Weet je zeker dat je alle bezochte filialen wilt wissen?')) {
    visited = {};
    save();
    locations.forEach((_, i) => renderState(i));
    updateProgress();
    applyFilters();
  }
});


const foodModal = document.getElementById('foodModal');
const foodInput = document.getElementById('foodInput');
const drinkInput = document.getElementById('drinkInput');
const noteInput = document.getElementById('noteInput');

function openFoodModal(index) {
  activeFoodIndex = index;
  const loc = locations[index];
  const entry = foodEntry(loc);
  document.getElementById('foodModalLocation').textContent = `Anne&Max ${loc.name}`;
  foodInput.value = entry.food || '';
  drinkInput.value = entry.drink || '';
  noteInput.value = entry.note || '';
  foodModal.classList.add('open');
}
function closeFoodModal() {
  foodModal.classList.remove('open');
  activeFoodIndex = null;
}
function refreshFoodCard(index) {
  const loc = locations[index];
  const summary = cards[index].querySelector('.food-summary');
  const content = foodSummaryHtml(loc);
  summary.innerHTML = content;
  summary.classList.toggle('has-data', !!content);
}
document.getElementById('cancelFood').addEventListener('click', closeFoodModal);
foodModal.addEventListener('click', event => {
  if (event.target === foodModal) closeFoodModal();
});
document.getElementById('saveFood').addEventListener('click', () => {
  if (activeFoodIndex === null) return;
  const loc = locations[activeFoodIndex];
  const entry = {
    food: foodInput.value.trim(),
    drink: drinkInput.value.trim(),
    note: noteInput.value.trim()
  };
  if (entry.food || entry.drink || entry.note) foodLog[idFor(loc)] = entry;
  else delete foodLog[idFor(loc)];
  localStorage.setItem(FOOD_KEY, JSON.stringify(foodLog));
  refreshFoodCard(activeFoodIndex);
  closeFoodModal();
});

updateProgress();
applyFilters();

function setMobileView(view) {
  document.body.classList.toggle('mobile-list', view === 'list');
  document.body.classList.toggle('mobile-map', view === 'map');
  const listBtn = document.getElementById('showList');
  const mapBtn = document.getElementById('showMap');
  if (listBtn && mapBtn) {
    listBtn.classList.toggle('active', view === 'list');
    mapBtn.classList.toggle('active', view === 'map');
  }
  if (view === 'map') {
    setTimeout(() => {
      map.invalidateSize();

      // Toon direct Nederland met alle momenteel zichtbare filialen.
      const visibleMarkers = markers.filter(marker => map.hasLayer(marker));
      if (visibleMarkers.length > 0) {
        map.fitBounds(
          L.featureGroup(visibleMarkers).getBounds().pad(0.12),
          { maxZoom: 9, animate: false }
        );
      } else {
        map.setView([52.15, 5.35], 7, { animate: false });
      }
    }, 180);
  }
}
document.getElementById('showList')?.addEventListener('click', () => setMobileView('list'));
document.getElementById('showMap')?.addEventListener('click', () => setMobileView('map'));

cards.forEach((card, i) => {
  card.querySelector('.card-content')?.addEventListener('dblclick', () => {
    if (window.innerWidth <= 820) {
      setMobileView('map');
      setTimeout(() => {
        map.setView(markers[i].getLatLng(), 16, {animate:true});
        markers[i].openPopup();
      }, 120);
    }
  });
});

window.addEventListener('resize', () => {
  if (window.innerWidth > 820) {
    document.body.classList.remove('mobile-list', 'mobile-map');
    map.invalidateSize();
  } else if (!document.body.classList.contains('mobile-list') && !document.body.classList.contains('mobile-map')) {
    setMobileView('list');
  }
});


let deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', (event) => {
  event.preventDefault();
  deferredInstallPrompt = event;
  const installButton = document.getElementById('installApp');
  if (installButton) installButton.style.display = 'block';
});

document.getElementById('installApp')?.addEventListener('click', async () => {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  document.getElementById('installApp').style.display = 'none';
});

window.addEventListener('appinstalled', () => {
  const installButton = document.getElementById('installApp');
  if (installButton) installButton.style.display = 'none';
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

</script>
